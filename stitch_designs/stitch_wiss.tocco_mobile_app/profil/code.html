<!DOCTYPE html>

<html class="light" lang="en"><head>

                        "on-surface": "#1b1b1d",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-tertiary-fixed-variant": "#574425",
                        "surface-container-low": "#f6f3f5",
                        "on-primary-container": "#7c839b",
                        "surface": "#fcf8fa",
                        "on-secondary-fixed-variant": "#454747",
                        "on-background": "#1b1b1d",
                        "surface-dim": "#dcd9db",

                        "primary-fixed": "#dae2fd",
                        "background": "#fcf8fa",
                        "on-error-container": "#93000a"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "margin": "20px",
                        "md": "16px",
                        "sm": "8px",
                        "gutter": "12px",
                        "unit": "4px",
                        "xs": "4px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "h2": ["Lexend"],
                        "h1": ["Lexend"],
                        "body-lg": ["Lexend"],
                        "display": ["Lexend"],
                        "body-md": ["Lexend"],
                        "label-sm": ["Lexend"]
                    },
                    "fontSize": {
                        "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "0em", "fontWeight": "600"}],
                        "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
                        "display": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf8fa;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col pb-24">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim flex items-center justify-between px-margin h-16 w-full docked full-width top-0 z-50 border-b border-outline-variant dark:border-on-surface-variant flat no shadows">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="school">school</span>
<h1 class="font-display text-h1 text-primary dark:text-primary-fixed-dim tracking-tight">WISS Tocco</h1>
</div>
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full" data-icon="search">search</button>
</div>
</header>
<main class="flex-1 px-margin pt-lg">
<!-- User Profile Section -->
<section class="flex flex-col items-center mb-xl">
<div class="relative mb-lg">
<div class="w-28 h-28 rounded-full border-4 border-white shadow-sm overflow-hidden bg-surface-container-high">
<img alt="Max Mustermann" class="w-full h-full object-cover" data-alt="A professional studio portrait of a confident young student with a friendly expression. The background is a soft, out-of-focus academic hallway with bright, natural lighting. The overall aesthetic is clean, modern, and high-key, utilizing a neutral color palette with sophisticated tonal layering. The image feels authoritative yet approachable." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3R8hQ4B7NTFa_hVmMWEA04CxYF-42r0ahCMWf_jukF4wn9vdQkDKbdDXw7e7H-UTvkdMSXALER-7_UyL3Nuo36gv8Axd9NEuvfdKisA72VCQsbOHBe6U5j1cuNX-hce79wFanHTvxhhxvoOe_qdtQ6hrIPkwNVfqE9wAqzzRXEPp9lHZ9T8llXzvtXEFlrKccEOyjuGk0MGLxAXWUmfzXqMkW_U8k7VpJrgXlSCHeM70CXC5ahMF0FBj3wjFgKfu-wlSMSYxWY70"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-on-primary w-10 h-10 rounded-full border-2 border-white flex items-center justify-center shadow-md active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
</div>
<div class="text-center">
<h2 class="font-h1 text-h1 text-on-surface">Max Mustermann</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Class 12B</p>
</div>
</section>
<!-- Profile Quick Stats (Bento Grid Style) -->
<div class="grid grid-cols-2 gap-gutter mb-xl">
<div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/30 flex flex-col items-center text-center">
<span class="material-symbols-outlined text-on-primary-container mb-sm" data-icon="grade">grade</span>
<span class="font-h2 text-h2">4.8</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">GPA</span>
</div>
<div class="bg-surface-container-low p-md rounded-xl border border-outline-variant/30 flex flex-col items-center text-center">
<span class="material-symbols-outlined text-on-primary-container mb-sm" data-icon="event_available">event_available</span>
<span class="font-h2 text-h2">98%</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Attendance</span>
</div>
</div>
<!-- Settings Options List -->
<section class="space-y-sm">
<h3 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest px-unit mb-md">Preferences</h3>
<a class="flex items-center justify-between p-md bg-surface-container-lowest rounded-xl border border-outline-variant/30 hover:bg-surface-container-high transition-colors active:scale-95 duration-150" href="#">
<div class="flex items-center gap-md">
<div class="bg-secondary-container p-sm rounded-lg">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="settings">settings</span>
</div>
<span class="font-body-lg text-body-lg">Settings</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</a>
<a class="flex items-center justify-between p-md bg-surface-container-lowest rounded-xl border border-outline-variant/30 hover:bg-surface-container-high transition-colors active:scale-95 duration-150" href="#">
<div class="flex items-center gap-md">
<div class="bg-secondary-container p-sm rounded-lg">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="notifications">notifications</span>
</div>
<span class="font-body-lg text-body-lg">Notifications</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</a>
<a class="flex items-center justify-between p-md bg-surface-container-lowest rounded-xl border border-outline-variant/30 hover:bg-surface-container-high transition-colors active:scale-95 duration-150" href="#">
<div class="flex items-center gap-md">
<div class="bg-secondary-container p-sm rounded-lg">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="privacy_tip">privacy_tip</span>
</div>
<span class="font-body-lg text-body-lg">Privacy &amp; Security</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</a>
</section>
<!-- Logout Action -->
<section class="mt-xl mb-lg">
<button class="w-full h-12 flex items-center justify-center gap-sm bg-error text-on-error rounded-xl font-h2 text-h2 hover:opacity-90 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                Logout
            </button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md border-t border-outline-variant dark:border-on-surface-variant shadow-sm dark:shadow-none flex justify-around items-center h-20 px-2 pb-safe w-full">
<!-- Files -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-1 hover:text-primary dark:hover:text-inverse-primary transition-colors tap:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="folder">folder</span>
<span class="font-label-sm text-label-sm">Files</span>
</a>
<!-- Timetable -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-1 hover:text-primary dark:hover:text-inverse-primary transition-colors tap:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-label-sm text-label-sm">Timetable</span>
</a>
<!-- Grades -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-1 hover:text-primary dark:hover:text-inverse-primary transition-colors tap:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="grade">grade</span>
<span class="font-label-sm text-label-sm">Grades</span>
</a>
<!-- Profile (Active) -->
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-primary-fixed-variant text-on-secondary-container dark:text-on-primary rounded-xl px-4 py-1 tap:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
</body></html>
